<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Batch Processor</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="logo">
        <img src="assets/logo.svg" alt="Logo" id="logo">
        <h1>Image Batch Processor</h1>
      </div>
    </header>
    
    <main class="app-content">
      <div class="drop-zone" id="dropZone">
        <div class="drop-zone-content">
          <img src="assets/upload.svg" alt="Upload" class="upload-icon">
          <h2>Drag &amp; Drop Images Here</h2>
          <p>or</p>
          <button id="selectFilesBtn" class="btn primary">Select Files</button>
          <p class="supported-formats">Supported formats: JPG, PNG, WEBP, HEIC</p>
        </div>
        <div id="fileList" class="file-list hidden"></div>
      </div>

      <div class="settings-panel">
        <h3>Image Settings</h3>
        
        <div class="setting-group">
          <label>Resize Method:</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="resizeType" value="width" checked>
              Fixed Width
            </label>
            <label class="radio-label">
              <input type="radio" name="resizeType" value="percentage">
              Percentage
            </label>
          </div>
        </div>

        <div class="setting-group" id="widthSetting">
          <label for="width">Width (pixels):</label>
          <input type="number" id="width" min="1" max="10000" value="800">
        </div>

        <div class="setting-group hidden" id="percentageSetting">
          <label for="percentage">Scale (%):</label>
          <input type="number" id="percentage" min="1" max="100" value="50">
        </div>

        <div class="setting-group">
          <label for="format">Output Format:</label>
          <select id="format">
            <option value="jpg">JPG</option>
            <option value="png">PNG</option>
            <option value="webp">WebP</option>
          </select>
        </div>

        <div class="setting-group">
          <label for="quality">Quality:</label>
          <div class="range-container">
            <input type="range" id="quality" min="1" max="100" value="80">
            <span id="qualityValue">80%</span>
          </div>
        </div>

        <div class="setting-group checkbox-group">
          <label for="stripMetadata">
            <input type="checkbox" id="stripMetadata" checked>
            Strip Metadata (EXIF)
          </label>
        </div>

        <div class="setting-group">
          <label>Output Directory:</label>
          <div class="output-dir-row">
            <input type="text" id="outputDir" readonly>
            <button id="outputDirBtn" class="btn small">Browse</button>
          </div>
        </div>
      </div>
    </main>

    <div class="action-bar">
      <button id="clearBtn" class="btn secondary">Clear</button>
      <button id="processBtn" class="btn primary" disabled>Process Images</button>
    </div>

    <div id="progressOverlay" class="progress-overlay hidden">
      <div class="progress-container">
        <h3>Processing Images</h3>
        <div class="progress-bar-container">
          <div id="progressBar" class="progress-bar"></div>
        </div>
        <p id="progressText">Processing 0 of 0</p>
        <p id="currentFileText">Current: </p>
      </div>
    </div>

    <div id="resultsOverlay" class="results-overlay hidden">
      <div class="results-container">
        <h3>Processing Complete</h3>
        <div id="resultsStats" class="results-stats">
          <div class="stat">
            <span class="stat-value" id="processedCount">0</span>
            <span class="stat-label">Processed</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="successCount">0</span>
            <span class="stat-label">Successful</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="errorCount">0</span>
            <span class="stat-label">Failed</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="totalSaved">0</span>
            <span class="stat-label">Space Saved</span>
          </div>
        </div>
        <div id="resultsList" class="results-list"></div>
        <div class="results-actions">
          <button id="openFolderBtn" class="btn secondary">Open Folder</button>
          <button id="closeResultsBtn" class="btn primary">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
